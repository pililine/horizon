<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1080" width="1800" height="1080">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #0f172a; }
    .title { font-size: 32px; font-weight: 700; }
    .subt { font-size: 15px; fill: #475569; }
    .sec { font-size: 19px; font-weight: 700; }
    .node { font-size: 14px; font-weight: 600; }
    .note { font-size: 12px; fill: #64748b; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1800" height="1080" fill="#fff"/>
  <text x="36" y="54" class="title">Horizon Current Flow (Local Daily Mode)</text>
  <text x="36" y="80" class="subt">qwen2.5:14b · enable_thinking=false · source quality profile · promo/spam pre-filter · tiered enrichment</text>

  <rect x="24" y="110" width="248" height="338" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="42" y="142" class="sec">A. Inputs / Sources</text>
  <rect x="290" y="110" width="286" height="338" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="308" y="142" class="sec">B. Fetch / Preprocess</text>
  <rect x="594" y="110" width="300" height="338" rx="10" fill="#ecfdf5" stroke="#86efac"/>
  <text x="612" y="142" class="sec">C-D. Analysis / Select</text>
  <rect x="912" y="110" width="250" height="338" rx="10" fill="#fef3c7" stroke="#fde68a"/>
  <text x="930" y="142" class="sec">E. Enrichment</text>
  <rect x="1180" y="110" width="236" height="338" rx="10" fill="#fdf2f8" stroke="#fbcfe8"/>
  <text x="1198" y="142" class="sec">F. Outputs</text>
  <rect x="1434" y="110" width="342" height="338" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="1452" y="142" class="sec">G. Automation / iCloud</text>

  <rect x="42" y="170" width="212" height="50" rx="8" fill="#fff" stroke="#c7d2fe"/><text x="148" y="201" text-anchor="middle" class="node">Telegram</text>
  <rect x="42" y="232" width="212" height="50" rx="8" fill="#fff" stroke="#c7d2fe"/><text x="148" y="263" text-anchor="middle" class="node">Hacker News</text>
  <rect x="42" y="294" width="212" height="50" rx="8" fill="#fff" stroke="#c7d2fe"/><text x="148" y="325" text-anchor="middle" class="node">RSS feeds</text>
  <rect x="42" y="356" width="212" height="50" rx="8" fill="#fff" stroke="#c7d2fe"/><text x="148" y="387" text-anchor="middle" class="node">GitHub</text>
  <text x="42" y="432" class="note">Optional disabled by default: Reddit / LWN / Webhook</text>

  <rect x="308" y="170" width="250" height="54" rx="8" fill="#fff" stroke="#a5f3fc"/><text x="433" y="203" text-anchor="middle" class="node">Fetch by 12h/24h window</text>
  <rect x="308" y="236" width="250" height="54" rx="8" fill="#fff" stroke="#a5f3fc"/><text x="433" y="269" text-anchor="middle" class="node">Rule / URL dedupe</text>
  <rect x="308" y="302" width="250" height="66" rx="8" fill="#fff" stroke="#a5f3fc"/>
  <text x="433" y="332" text-anchor="middle" class="node">Promo/spam pre-filter</text>
  <text x="433" y="352" text-anchor="middle" class="note">Before AI scoring</text>
  <rect x="308" y="380" width="250" height="54" rx="8" fill="#fff" stroke="#a5f3fc"/>
  <text x="433" y="410" text-anchor="middle" class="node">Attach source metadata</text>
  <text x="433" y="427" text-anchor="middle" class="note">quality / weight / topics</text>

  <rect x="612" y="170" width="264" height="70" rx="8" fill="#fff" stroke="#86efac"/>
  <text x="744" y="198" text-anchor="middle" class="node">Local LLM scoring</text>
  <text x="744" y="218" text-anchor="middle" class="note">qwen2.5:14b via Ollama OpenAI API</text>
  <text x="744" y="235" text-anchor="middle" class="note">enable_thinking=false + thinking cleanup</text>
  <rect x="612" y="252" width="264" height="54" rx="8" fill="#fff" stroke="#86efac"/><text x="744" y="285" text-anchor="middle" class="node">Bounded semantic candidate pool</text>
  <rect x="612" y="318" width="264" height="54" rx="8" fill="#fff" stroke="#86efac"/><text x="744" y="351" text-anchor="middle" class="node">Semantic dedupe</text>
  <rect x="612" y="384" width="264" height="54" rx="8" fill="#fff" stroke="#86efac"/>
  <text x="744" y="412" text-anchor="middle" class="node">Ranking + final selection</text>
  <text x="744" y="429" text-anchor="middle" class="note">ranking_score = ai_score + source_weight</text>

  <rect x="930" y="170" width="214" height="64" rx="8" fill="#fff" stroke="#fde68a"/>
  <text x="1037" y="198" text-anchor="middle" class="node">tiered enrichment</text>
  <text x="1037" y="218" text-anchor="middle" class="note">full / brief / skipped</text>
  <rect x="930" y="246" width="214" height="54" rx="8" fill="#fff" stroke="#fde68a"/><text x="1037" y="279" text-anchor="middle" class="node">Enhance final items only</text>
  <rect x="930" y="312" width="214" height="54" rx="8" fill="#fff" stroke="#fde68a"/><text x="1037" y="345" text-anchor="middle" class="node">Display original ai_score</text>
  <rect x="930" y="378" width="214" height="54" rx="8" fill="#fff" stroke="#fde68a"/><text x="1037" y="411" text-anchor="middle" class="node">Bilingual fields generated</text>

  <rect x="1198" y="170" width="200" height="54" rx="8" fill="#fff" stroke="#fbcfe8"/><text x="1298" y="203" text-anchor="middle" class="node">data/summaries</text>
  <rect x="1198" y="236" width="200" height="54" rx="8" fill="#fff" stroke="#fbcfe8"/><text x="1298" y="269" text-anchor="middle" class="node">docs/_posts</text>
  <rect x="1198" y="302" width="200" height="54" rx="8" fill="#fff" stroke="#fbcfe8"/><text x="1298" y="335" text-anchor="middle" class="node">Chinese + English Markdown</text>
  <rect x="1198" y="368" width="200" height="64" rx="8" fill="#fff" stroke="#fbcfe8"/>
  <text x="1298" y="396" text-anchor="middle" class="node">Empty report only when</text>
  <text x="1298" y="416" text-anchor="middle" class="note">candidate count is zero</text>

  <rect x="1452" y="170" width="306" height="54" rx="8" fill="#fff" stroke="#fed7aa"/><text x="1605" y="203" text-anchor="middle" class="node">run-and-export-icloud.sh (hours=12)</text>
  <rect x="1452" y="236" width="306" height="54" rx="8" fill="#fff" stroke="#fed7aa"/><text x="1605" y="269" text-anchor="middle" class="node">launchd schedule: 08:30 / 20:30</text>
  <rect x="1452" y="302" width="306" height="66" rx="8" fill="#fff" stroke="#fed7aa"/>
  <text x="1605" y="332" text-anchor="middle" class="node">Export to iCloud daily/YYYY-MM-DD/</text>
  <text x="1605" y="352" text-anchor="middle" class="note">YYYY-MM-DD-HHMM-slot-lang.md</text>
  <rect x="1452" y="380" width="306" height="54" rx="8" fill="#fff" stroke="#fed7aa"/><text x="1605" y="413" text-anchor="middle" class="node">Append-only unique filenames</text>

  <line x1="254" y1="280" x2="308" y2="280" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="558" y1="280" x2="612" y2="280" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="876" y1="280" x2="930" y2="280" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1144" y1="280" x2="1198" y2="280" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1398" y1="280" x2="1452" y2="280" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="24" y="470" width="1752" height="586" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="42" y="502" class="sec">H. Observability / Safety</text>
  <text x="42" y="534" class="node">Logs:</text>
  <text x="120" y="534" class="subt">logs/, per-run logs, run summary metrics, source contribution, enrichment counts</text>
  <text x="42" y="562" class="node">Safety defaults:</text>
  <text x="186" y="562" class="subt">no email/webhook by default, no .env leakage, no auto-commit of generated summaries/posts/reports</text>
  <text x="42" y="590" class="node">iCloud export defaults:</text>
  <text x="212" y="590" class="subt">latest.md skipped unless HORIZON_UPDATE_LATEST=1; posts skipped unless HORIZON_EXPORT_POSTS=1</text>
  <text x="42" y="618" class="node">Preflight guards:</text>
  <text x="180" y="618" class="subt">writability checks, stale-output protection, copy failure exits non-zero</text>

  <text x="42" y="664" class="node">Pipeline steps:</text>
  <text x="42" y="690" class="subt">1) Fetch sources  2) Rule/URL dedupe  3) Promo/spam pre-filter  4) AI scoring</text>
  <text x="42" y="714" class="subt">5) Semantic dedupe  6) Source-quality ranking  7) Final selection  8) Tiered enrichment</text>
  <text x="42" y="738" class="subt">9) Bilingual Markdown generation  10) iCloud morning/evening export</text>
</svg>
