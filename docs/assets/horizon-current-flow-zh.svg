<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 1240" width="1800" height="1240">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 16px; fill: #475569; }
    .sec { font-size: 20px; font-weight: 700; }
    .node { font-size: 15px; font-weight: 600; }
    .sub { font-size: 13px; fill: #475569; }
    .note { font-size: 12px; fill: #64748b; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1800" height="1240" fill="#ffffff"/>
  <text x="40" y="56" class="title">Horizon 当前流程图（本地日常模式）</text>
  <text x="40" y="84" class="subtitle">默认模型 qwen2.5:14b · enable_thinking=false · enrichment_mode=tiered · 12h/24h 窗口</text>

  <!-- Section frames -->
  <rect x="30" y="120" width="250" height="360" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="48" y="152" class="sec">A. 输入源</text>
  <rect x="300" y="120" width="300" height="360" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
  <text x="318" y="152" class="sec">B. 抓取与预处理</text>
  <rect x="620" y="120" width="300" height="360" rx="10" fill="#ecfdf5" stroke="#86efac"/>
  <text x="638" y="152" class="sec">C-D. 评分与选择</text>
  <rect x="940" y="120" width="260" height="360" rx="10" fill="#fef3c7" stroke="#fde68a"/>
  <text x="958" y="152" class="sec">E. 分层增强</text>
  <rect x="1220" y="120" width="250" height="360" rx="10" fill="#fdf2f8" stroke="#fbcfe8"/>
  <text x="1238" y="152" class="sec">F. 输出</text>
  <rect x="1490" y="120" width="280" height="360" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="1508" y="152" class="sec">G. 自动化与 iCloud</text>

  <rect x="30" y="500" width="1740" height="700" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="48" y="532" class="sec">H. 可观测与安全边界</text>

  <!-- A -->
  <rect x="48" y="178" width="214" height="54" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="155" y="211" text-anchor="middle" class="node">Telegram</text>
  <rect x="48" y="244" width="214" height="54" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="155" y="277" text-anchor="middle" class="node">Hacker News</text>
  <rect x="48" y="310" width="214" height="54" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="155" y="343" text-anchor="middle" class="node">RSS Feeds</text>
  <rect x="48" y="376" width="214" height="54" rx="8" fill="#ffffff" stroke="#c7d2fe"/>
  <text x="155" y="409" text-anchor="middle" class="node">GitHub</text>
  <text x="48" y="456" class="note">可选默认关闭：Reddit / LWN / Webhook</text>

  <!-- B -->
  <rect x="318" y="178" width="264" height="58" rx="8" fill="#ffffff" stroke="#a5f3fc"/>
  <text x="450" y="211" text-anchor="middle" class="node">按窗口抓取（12h/24h）</text>
  <rect x="318" y="248" width="264" height="58" rx="8" fill="#ffffff" stroke="#a5f3fc"/>
  <text x="450" y="281" text-anchor="middle" class="node">Rule/URL 去重</text>
  <rect x="318" y="318" width="264" height="72" rx="8" fill="#ffffff" stroke="#a5f3fc"/>
  <text x="450" y="348" text-anchor="middle" class="node">促销/垃圾 pre-filter</text>
  <text x="450" y="368" text-anchor="middle" class="sub">红包 / coupon / cashback 等</text>
  <rect x="318" y="402" width="264" height="58" rx="8" fill="#ffffff" stroke="#a5f3fc"/>
  <text x="450" y="431" text-anchor="middle" class="node">附加 source metadata</text>
  <text x="450" y="448" text-anchor="middle" class="sub">source_quality / source_weight / topics</text>

  <!-- C-D -->
  <rect x="638" y="178" width="264" height="72" rx="8" fill="#ffffff" stroke="#86efac"/>
  <text x="770" y="207" text-anchor="middle" class="node">本地 LLM 评分</text>
  <text x="770" y="227" text-anchor="middle" class="sub">qwen2.5:14b (Ollama OpenAI API)</text>
  <text x="770" y="244" text-anchor="middle" class="sub">enable_thinking=false + thinking 清理</text>
  <rect x="638" y="264" width="264" height="58" rx="8" fill="#ffffff" stroke="#86efac"/>
  <text x="770" y="297" text-anchor="middle" class="node">候选池裁剪</text>
  <text x="770" y="314" text-anchor="middle" class="sub">semantic_dedupe_candidate_limit</text>
  <rect x="638" y="336" width="264" height="58" rx="8" fill="#ffffff" stroke="#86efac"/>
  <text x="770" y="369" text-anchor="middle" class="node">语义去重</text>
  <rect x="638" y="408" width="264" height="58" rx="8" fill="#ffffff" stroke="#86efac"/>
  <text x="770" y="436" text-anchor="middle" class="node">排序与最终选择</text>
  <text x="770" y="454" text-anchor="middle" class="sub">ranking_score = ai_score + source_weight</text>

  <!-- E -->
  <rect x="958" y="178" width="224" height="70" rx="8" fill="#ffffff" stroke="#fde68a"/>
  <text x="1070" y="207" text-anchor="middle" class="node">tiered enrichment</text>
  <text x="1070" y="227" text-anchor="middle" class="sub">full / brief / skipped</text>
  <text x="1070" y="244" text-anchor="middle" class="sub">full阈值 / brief阈值 / max_full</text>
  <rect x="958" y="264" width="224" height="58" rx="8" fill="#ffffff" stroke="#fde68a"/>
  <text x="1070" y="297" text-anchor="middle" class="node">只增强 final output</text>
  <rect x="958" y="336" width="224" height="58" rx="8" fill="#ffffff" stroke="#fde68a"/>
  <text x="1070" y="369" text-anchor="middle" class="node">展示分数仍为 ai_score</text>
  <rect x="958" y="408" width="224" height="58" rx="8" fill="#ffffff" stroke="#fde68a"/>
  <text x="1070" y="437" text-anchor="middle" class="node">中英文字段生成</text>
  <text x="1070" y="454" text-anchor="middle" class="sub">summary / tags / references</text>

  <!-- F -->
  <rect x="1238" y="178" width="214" height="58" rx="8" fill="#ffffff" stroke="#fbcfe8"/>
  <text x="1345" y="211" text-anchor="middle" class="node">data/summaries</text>
  <text x="1345" y="228" text-anchor="middle" class="sub">horizon-YYYY-MM-DD-zh/en.md</text>
  <rect x="1238" y="248" width="214" height="58" rx="8" fill="#ffffff" stroke="#fbcfe8"/>
  <text x="1345" y="281" text-anchor="middle" class="node">docs/_posts</text>
  <text x="1345" y="298" text-anchor="middle" class="sub">YYYY-MM-DD-summary-zh/en.md</text>
  <rect x="1238" y="318" width="214" height="58" rx="8" fill="#ffffff" stroke="#fbcfe8"/>
  <text x="1345" y="349" text-anchor="middle" class="node">中英文 Markdown 日报</text>
  <rect x="1238" y="388" width="214" height="72" rx="8" fill="#ffffff" stroke="#fbcfe8"/>
  <text x="1345" y="417" text-anchor="middle" class="node">空报告仅在 0 候选时产生</text>
  <text x="1345" y="438" text-anchor="middle" class="sub">不足最小条目时输出全部候选</text>

  <!-- G -->
  <rect x="1508" y="178" width="244" height="58" rx="8" fill="#ffffff" stroke="#fed7aa"/>
  <text x="1630" y="211" text-anchor="middle" class="node">run-and-export-icloud.sh</text>
  <text x="1630" y="228" text-anchor="middle" class="sub">默认 hours=12</text>
  <rect x="1508" y="248" width="244" height="58" rx="8" fill="#ffffff" stroke="#fed7aa"/>
  <text x="1630" y="281" text-anchor="middle" class="node">launchd: 08:30 / 20:30</text>
  <rect x="1508" y="318" width="244" height="72" rx="8" fill="#ffffff" stroke="#fed7aa"/>
  <text x="1630" y="348" text-anchor="middle" class="node">导出 iCloud daily/YYYY-MM-DD/</text>
  <text x="1630" y="368" text-anchor="middle" class="sub">YYYY-MM-DD-HHMM-slot-lang.md</text>
  <rect x="1508" y="404" width="244" height="58" rx="8" fill="#ffffff" stroke="#fed7aa"/>
  <text x="1630" y="437" text-anchor="middle" class="node">append-only 唯一文件名</text>

  <!-- Arrows top -->
  <line x1="262" y1="290" x2="318" y2="290" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="582" y1="290" x2="638" y2="290" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="902" y1="290" x2="958" y2="290" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1182" y1="290" x2="1238" y2="290" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1452" y1="290" x2="1508" y2="290" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- H observability -->
  <rect x="48" y="560" width="360" height="130" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="68" y="592" class="node">运行日志</text>
  <text x="68" y="616" class="sub">logs/horizon-icloud.out.log</text>
  <text x="68" y="638" class="sub">logs/horizon-icloud.err.log</text>
  <text x="68" y="660" class="sub">logs/horizon-icloud-YYYYMMDD-HHMMSS.log</text>

  <rect x="430" y="560" width="420" height="130" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="450" y="592" class="node">关键统计</text>
  <text x="450" y="616" class="sub">fetched / deduped / scored / high_score_count</text>
  <text x="450" y="638" class="sub">semantic_deduped / final_output / enrichment counts</text>
  <text x="450" y="660" class="sub">token usage / source contribution / quality mix</text>

  <rect x="872" y="560" width="430" height="130" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="892" y="592" class="node">默认安全边界</text>
  <text x="892" y="616" class="sub">不启用 email/webhook（默认）</text>
  <text x="892" y="638" class="sub">不泄露 .env；LOCAL_LLM_API_KEY 仅环境读取</text>
  <text x="892" y="660" class="sub">不将生成 summaries/posts/reports 自动提交</text>

  <rect x="1324" y="560" width="428" height="130" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1344" y="592" class="node">iCloud 导出策略</text>
  <text x="1344" y="616" class="sub">latest.md 默认不更新（HORIZON_UPDATE_LATEST=1 才更新）</text>
  <text x="1344" y="638" class="sub">posts 默认不导出（HORIZON_EXPORT_POSTS=1 才导出）</text>
  <text x="1344" y="660" class="sub">预检可写 + stale 文件保护 + copy 失败即退出</text>

  <rect x="48" y="714" width="1704" height="168" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="68" y="746" class="node">当前默认配置（摘录）</text>
  <text x="68" y="770" class="sub">AI: provider=openai, model=qwen2.5:14b, base_url=http://localhost:11434/v1, enable_thinking=false</text>
  <text x="68" y="792" class="sub">Filtering: ai_score_threshold=7.0, min=10, max=15, semantic_dedupe_candidate_limit=25, enable_promo_filter=true</text>
  <text x="68" y="814" class="sub">Source profile: source_quality(high/medium/low), source_weight(-1.0~+1.0), ranking_score = ai_score + source_weight</text>
  <text x="68" y="836" class="sub">Enrichment: tiered, full_threshold=8.0, brief_threshold=7.0, enrichment_max_full_items=3, timeout=120s</text>
  <text x="68" y="858" class="sub">Automation: launchd 08:30/20:30, 每次回看 12h，导出到 iCloud daily/YYYY-MM-DD/</text>

  <rect x="48" y="906" width="1704" height="266" rx="10" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="68" y="938" class="node">Pipeline 10 步（实现对应）</text>
  <text x="68" y="962" class="sub">1) Fetch sources → 2) Rule/URL dedupe → 3) Promo/spam pre-filter → 4) AI scoring</text>
  <text x="68" y="984" class="sub">5) Semantic dedupe (bounded pool) → 6) Source quality ranking (ranking_score)</text>
  <text x="68" y="1006" class="sub">7) Final selection (min/max rule, 显示分仍是 ai_score) → 8) Tiered enrichment (full/brief/skipped)</text>
  <text x="68" y="1028" class="sub">9) 双语 Markdown 生成 (data/summaries + docs/_posts) → 10) iCloud morning/evening 导出</text>
  <text x="68" y="1060" class="note">注：本图是当前代码/配置快照，不包含未来实验配置（例如 qwen3 默认切换）。</text>
</svg>
